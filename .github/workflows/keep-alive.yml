name: Keep Render Services Alive

on:
  schedule:
    # Runs every 14 minutes
    - cron: '*/1 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: |
          curl -s -o /dev/null -w "Backend: %{http_code}\n" \
            https://devflow-nolh.onrender.com/api/v1/auth/me || true

      - name: Ping Judge Service
        run: |
          curl -s -o /dev/null -w "Judge: %{http_code}\n" \
            https://devflow-1-r33z.onrender.com/health || true
