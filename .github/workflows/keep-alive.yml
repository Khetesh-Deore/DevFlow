name: Keep Render Services Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://devflow-nolh.onrender.com/api/v1/auth/me || echo "000")
          echo "Backend status: $STATUS"

      - name: Ping Judge Service Health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://devflow-judge.onrender.com/health || echo "000")
          echo "Judge status: $STATUS"

      - name: Warm up Judge (test execution)
        run: |
          curl -s -X POST https://devflow-judge.onrender.com/execute \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.JUDGE_API_KEY }}" \
            -d '{"code":"print(1)","language":"python","testcases":[{"id":"ping","input":"","expected_output":"1"}],"time_limit":3000,"memory_limit":128,"mode":"run"}' \
            -o /dev/null -w "Judge warm-up: %{http_code}\n" || true
