services:
  - type: web
    name: devflow-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: JUDGE_SERVICE_URL
        sync: false
      - key: JUDGE_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  - type: web
    name: devflow-judge
    runtime: docker
    rootDir: judge
    dockerfilePath: ./Dockerfile
    envVars:
      - key: API_KEY
        sync: false
      - key: MAX_CONCURRENT
        value: 5
      - key: DEFAULT_TIMEOUT
        value: 5
